version: '3'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: nakama
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.21.1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address nakama:localdev@postgres:5432/nakama?sslmode=disable &&
        exec /nakama/nakama --database.address nakama:localdev@postgres:5432/nakama?sslmode=disable
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --socket.server_key defaultkey
    volumes:
      - ./nakama/build:/nakama/data/modules
      - ./postgres/migrations:/nakama/data/custom-migrations
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres-data:
